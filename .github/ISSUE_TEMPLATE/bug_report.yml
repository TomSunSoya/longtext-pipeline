name: Bug report
description: Report a reproducible bug or behavioral regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please include a minimal reproduction and the exact command or config you ran.
  - type: input
    id: version
    attributes:
      label: longtext-pipeline version
      placeholder: e.g. 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.11.9
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or API call
      description: Paste the exact CLI command, config snippet, or integration call.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: text
