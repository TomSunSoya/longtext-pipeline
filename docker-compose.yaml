version: '3.8'

services:
  longtext:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: longtext-pipeline
    volumes:
      - ./input:/data:ro
      - ./output:/output
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LONGTEXT_MODEL_NAME=${LONGTEXT_MODEL_NAME:-gpt-4o}
      - LONGTEXT_OUTPUT_DIR=/output
    restart: unless-stopped
    command: --help
